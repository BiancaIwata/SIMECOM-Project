<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIMECOM</title>
    <link rel="stylesheet" href="css/stylelogin.css">
</head>
<body>
    <div class="card">

    <div class="container">


        <div class="sessao-esquerda">
          <img src="assets/login.png" alt="" class="bg-img">
          <div class="overlay">
              <img src="assets/logo_simples.png" alt="Logo" class="logo">
              <p class="slogan">Onde dados viram oportunidades</p>
        </div>
      </div>

      <div class="sessao-direita">
        <img src="assets/logo_simples.png" alt="Logo" class="logo-mobile">
        <div class="login-box">
          <h2>Login</h2>
          <p class="legenda">Entre com as suas credenciais</p>

          <form>
            <label>Email</label>
            <input type="email" placeholder="exemplo@email.com">

            <label>Senha</label>
            <input type="password" placeholder="*********">

            <button type="submit">Entrar</button>
          </form>

          <p class="registrar">
            Ainda não tem uma conta?
            <a href="./cadastro.html">Cadastre-se agora!</a>
          </p>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
