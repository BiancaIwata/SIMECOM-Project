<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | SIMECOM</title>   
    <link rel="stylesheet" href="css/stylecadastro.css">
    <link rel="icon" href="assets/logo_simples.png">
    <title>Cadastro | SIMECOM</title>
</head>
<body>
    <div class="card">

    <div class="container">


        <div class="sessao-esquerda">
          <img src="assets/cadastro.png" alt="" class="bg-img">
          <div class="overlay">
              <img src="assets/logo_simples.png" alt="Logo" class="logo">
              <p class="slogan">Onde dados viram oportunidades</p>
        </div>
      </div>

      <div class="sessao-direita">
        <img src="assets/logo_simples.png" alt="Logo" class="logo-mobile">
        <div class="login-box">
          <h2>Cadastro</h2>
          <p class="legenda">Crie sua conta e aproveite os benefícios</p>

          <form>
            <label>Nome</label>
            <input type="text" placeholder="Clara">

            <label>Sobrenome</label>
            <input type="text" placeholder="Salomão">

            <label>Email</label>
            <input type="email" placeholder="exemplo@email.com">

            <label>Senha</label>
            <input type="password" placeholder="*********">

            <label>Confirmação de Senha</label>
            <input type="password" placeholder="*********">

            <button type="submit">Entrar</button>
          </form>

          <p class="registrar">
            Já tem uma conta?
            <a href="./login.html">Faça login agora!</a>
          </p>
        </div>
      </div>

    </div>

  </div>

    
</body>
</html>
