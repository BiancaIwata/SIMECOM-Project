<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/forum.css">
    <link rel="icon" href="./assets/logo_simples.png" type="image/png">
    <script src="./js/forum.js"></script>

    <title>Fórum | SIMECOM</title>

</head>

<body>

    <div class="container">

        <aside class="sidebar">
            <div class="sidebar-logo">
                <a href="index.html">
                    <img src="./assets/logo.png" alt="Simecom">
                </a>
            </div>

            <div class="user">
                <div class="avatar">
                    <a href="configuracoes.html">
                        <img src="./assets/Group 43.png">
                    </a>
                </div>
                <h3>Olá, <p id="nome_usuario">usuário</p>!</h3>
            </div>

            <nav class="menu">
                <ul>
                    <li><a href="index.html">
                            <img src="./assets/home_24dp_0B3C5D_FILL0_wght400_GRAD0_opsz24 1.png">
                            Home
                        </a>
                    </li>
                    <li>
                        <a href="preferencias.html">
                            <img src="./assets/check_box_24dp_0B3C5D_FILL0_wght400_GRAD0_opsz24 1.png">
                            Preferências
                        </a>
                    </li class="ativo">
                    <li><a href="./forum.html">
                            <img src="./assets/chat_bubble_24dp_0B3C5D_FILL0_wght400_GRAD0_opsz24 1.png">
                            Fórum
                        </a>
                    </li>
                    <li><a href="./dashboardMacro.html">
                            <img src="./assets/space_dashboard_24dp_0B3C5D_FILL0_wght400_GRAD0_opsz24 1.png">
                            Dashboards
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main">

            <h1>Fórum</h1>
            <p class="subtitulo">
                Veja o que outros usuários estão falando sobre o mercado e compartilhe seus insights no fórum!
            </p>

            <div class="input-box">
                <span>👤</span>
                <input type="text" id="theme" placeholder="Escreva um tema...">
                <input type="text" id="comment_content" placeholder="Deixe seu comentário...">
                <button onclick="postar_comentario()">Postar</button>
            </div>

            <div class="layout">


                <div id="allPosts" class="comentarios">
                    <h2>Últimos comentários</h2>


                    <div class="card">
                        <span class="icon">👤</span>
                        <div>
                            <p id="content-text">Not Found</p>
                        </div>
                    </div>



                </div>


                <div class="topicos">
                    <h3>Tópicos mais curtidos</h3>
                    <ol id="topiccontent">
                    </ol>
                </div>

            </div>

        </main>

    </div>

</body>

</html>

<script>
    nome_usuario.innerHTML = sessionStorage.NOME_USUARIO
</script>
